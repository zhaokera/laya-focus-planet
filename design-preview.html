<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>舒尔特方格游戏 - 设计稿预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .phone-frame {
            width: 375px;
            height: 750px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 0 0 3px #333;
            position: relative;
        }

        .screen {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* 背景层 */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0D0B1E 0%, #1a1035 50%, #0D0B1E 100%);
        }

        /* 星星 */
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 顶部光晕 */
        .top-glow {
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(139, 92, 246, 0.25) 0%, transparent 70%);
        }

        .bottom-glow {
            position: absolute;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            height: 250px;
            background: radial-gradient(ellipse, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
        }

        /* 标题 */
        .title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #F8F3CF;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: 4px;
        }

        /* HUD面板 */
        .hud-panel {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            height: 90px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .hud-item {
            text-align: center;
            width: 100px;
        }

        .hud-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .hud-value {
            font-size: 26px;
            font-weight: bold;
        }

        .hud-value.target { color: #FFD700; }
        .hud-value.timer { color: #4FC3F7; }
        .hud-value.error { color: #FF6B6B; }

        /* 难度按钮 */
        .difficulty-group {
            position: absolute;
            top: 185px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }

        .diff-btn {
            width: 65px;
            height: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .diff-btn.active {
            background: linear-gradient(180deg, #8B5CF6 0%, #6D28D9 100%);
            border: 2px solid #A78BFA;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .diff-btn:not(.active) {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 游戏面板 */
        .game-panel {
            position: absolute;
            top: 245px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 320px;
            background: linear-gradient(180deg, #1E1B4B 0%, #312E81 100%);
            border: 3px solid #4338CA;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.2) inset;
            padding: 16px;
        }

        /* 装饰角标 */
        .corner {
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: rgba(139, 92, 246, 0.6);
            border-style: solid;
            border-width: 0;
        }

        .corner-tl { top: 8px; left: 8px; border-top-width: 3px; border-left-width: 3px; }
        .corner-tr { top: 8px; right: 8px; border-top-width: 3px; border-right-width: 3px; }
        .corner-bl { bottom: 8px; left: 8px; border-bottom-width: 3px; border-left-width: 3px; }
        .corner-br { bottom: 8px; right: 8px; border-bottom-width: 3px; border-right-width: 3px; }

        /* 格子网格 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background: linear-gradient(180deg, #4338CA 0%, #3730A3 100%);
            border: 2px solid #6366F1;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #E0E7FF;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            position: relative;
            transition: transform 0.1s;
        }

        .grid-cell:active {
            transform: scale(0.95);
        }

        .grid-cell.correct {
            background: linear-gradient(180deg, #CA8A04 0%, #854D0E 100%);
            border-color: #FFD700;
            color: #FEF08A;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        }

        .grid-cell.wrong {
            background: linear-gradient(180deg, #EF4444 0%, #991B1B 100%);
            border-color: #FF6B6B;
            color: #FECACA;
            box-shadow: 0 0 20px rgba(248, 113, 113, 0.4);
        }

        .grid-cell.active {
            border-color: #A78BFA;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.5);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* 按钮 */
        .start-btn {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 54px;
            background: linear-gradient(180deg, #8B5CF6 0%, #6D28D9 100%);
            border: none;
            border-radius: 27px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5), 0 -2px 10px rgba(255, 255, 255, 0.1) inset;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            transition: all 0.15s;
        }

        .start-btn:active {
            transform: translateX(-50%) scale(0.97);
            box-shadow: 0 2px 10px rgba(139, 92, 246, 0.4);
        }

        /* 提示按钮 */
        .hint-btn {
            position: absolute;
            top: 185px;
            right: 20px;
            width: 80px;
            height: 34px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 17px;
            font-size: 12px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 完成弹窗 */
        .popup-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .popup-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .popup {
            width: 280px;
            background: linear-gradient(180deg, #1E1B4B 0%, #4C1D95 100%);
            border: 3px solid #7C3AED;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s;
        }

        .popup-overlay.show .popup {
            transform: scale(1);
        }

        .popup-title {
            font-size: 28px;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 16px;
        }

        .popup-result {
            font-size: 16px;
            color: #E0E7FF;
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .popup-btn {
            width: 140px;
            height: 44px;
            background: linear-gradient(180deg, #8B5CF6 0%, #6D28D9 100%);
            border: none;
            border-radius: 22px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
        }

        /* 图例说明 */
        .legend {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        .legend-dot.normal { background: #6366F1; }
        .legend-dot.correct { background: #FFD700; }
        .legend-dot.wrong { background: #EF4444; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="screen">
            <!-- 背景层 -->
            <div class="bg-layer">
                <div class="top-glow"></div>
                <div class="bottom-glow"></div>
                <!-- 星星 -->
                <div class="star" style="top: 15%; left: 8%; width: 2px; height: 2px; animation-delay: 0s;"></div>
                <div class="star" style="top: 8%; left: 25%; width: 1.5px; height: 1.5px; animation-delay: 0.5s;"></div>
                <div class="star" style="top: 20%; left: 70%; width: 2px; height: 2px; animation-delay: 1s;"></div>
                <div class="star" style="top: 12%; left: 85%; width: 1.5px; height: 1.5px; animation-delay: 1.5s;"></div>
                <div class="star" style="top: 25%; left: 15%; width: 1.5px; height: 1.5px; animation-delay: 0.3s;"></div>
                <div class="star" style="top: 18%; left: 55%; width: 2px; height: 2px; animation-delay: 0.8s;"></div>
                <div class="star" style="top: 30%; left: 90%; width: 1.5px; height: 1.5px; animation-delay: 1.2s;"></div>
                <div class="star" style="top: 35%; left: 5%; width: 1.5px; height: 1.5px; animation-delay: 0.2s;"></div>
                <div class="star" style="top: 5%; left: 45%; width: 1.5px; height: 1.5px; animation-delay: 1.8s;"></div>
                <div class="star" style="top: 22%; left: 35%; width: 1px; height: 1px; animation-delay: 0.7s;"></div>
            </div>

            <!-- 标题 -->
            <div class="title">舒尔特方格</div>

            <!-- HUD面板 -->
            <div class="hud-panel">
                <div class="hud-item">
                    <div class="hud-label">目标</div>
                    <div class="hud-value target">1</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">用时</div>
                    <div class="hud-value timer">00:00</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">错误</div>
                    <div class="hud-value error">0</div>
                </div>
            </div>

            <!-- 难度按钮 -->
            <div class="difficulty-group">
                <div class="diff-btn">3×3</div>
                <div class="diff-btn active">4×4</div>
                <div class="diff-btn">5×5</div>
            </div>

            <!-- 提示按钮 -->
            <div class="hint-btn">提示: 关</div>

            <!-- 游戏面板 -->
            <div class="game-panel">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
                <div class="grid-container">
                    <div class="grid-cell">1</div>
                    <div class="grid-cell">6</div>
                    <div class="grid-cell">3</div>
                    <div class="grid-cell">8</div>
                    <div class="grid-cell">2</div>
                    <div class="grid-cell">9</div>
                    <div class="grid-cell">4</div>
                    <div class="grid-cell active">5</div>
                    <div class="grid-cell">12</div>
                    <div class="grid-cell">7</div>
                    <div class="grid-cell">10</div>
                    <div class="grid-cell">15</div>
                    <div class="grid-cell correct">11</div>
                    <div class="grid-cell">13</div>
                    <div class="grid-cell">16</div>
                    <div class="grid-cell wrong">14</div>
                    <div class="grid-cell">17</div>
                    <div class="grid-cell">20</div>
                    <div class="grid-cell">18</div>
                    <div class="grid-cell">19</div>
                    <div class="grid-cell">21</div>
                    <div class="grid-cell">24</div>
                    <div class="grid-cell">22</div>
                    <div class="grid-cell">25</div>
                    <div class="grid-cell">23</div>
                </div>
            </div>

            <!-- 开始按钮 -->
            <button class="start-btn">开始游戏</button>

            <!-- 图例 -->
            <div class="legend">
                <div class="legend-item"><div class="legend-dot normal"></div>待点</div>
                <div class="legend-item"><div class="legend-dot correct"></div>正确</div>
                <div class="legend-item"><div class="legend-dot wrong"></div>错误</div>
            </div>
        </div>
    </div>

    <script>
        // 点击开始按钮显示完成弹窗
        document.querySelector('.start-btn').addEventListener('click', function() {
            document.querySelector('.popup-overlay').classList.add('show');
        });

        // 点击弹窗关闭
        document.querySelector('.popup-overlay').addEventListener('click', function() {
            this.classList.remove('show');
        });

        // 难度按钮切换
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
